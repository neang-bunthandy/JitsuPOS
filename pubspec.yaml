name: project_pos
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  sqflite: ^2.4.2+1
  path: ^1.9.1
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  pdf: ^3.12.0
  printing: ^5.13.0
  path_provider: ^2.1.5
  mobile_scanner: ^7.2.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Icon_Jitsu_POS.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/Icon_Jitsu_POS.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/Icon_Jitsu_POS.png
